<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer square border -->
  <rect width="32" height="32" rx="2" fill="#1e293b"/>
  <!-- Inner white area -->
  <rect x="3" y="3" width="26" height="26" rx="1" fill="white"/>
  <!-- Set square shape -->
  <!-- Vertical bar -->
  <rect x="9" y="6" width="3" height="20" fill="#1e293b"/>
  <!-- Horizontal bar -->
  <rect x="9" y="23" width="17" height="3" fill="#1e293b"/>
  <!-- Diagonal -->
  <polygon points="9,6 12,6 26,23 26,26 23,26 9,9" fill="#1e293b"/>
  <!-- Horizontal crossbar lines inside triangle -->
  <rect x="10" y="13" width="4" height="2" fill="white"/>
  <rect x="10" y="17" width="7" height="2" fill="white"/>
</svg>
